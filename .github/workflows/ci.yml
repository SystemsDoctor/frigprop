name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      # Truth data (tests/truth.json) is committed, so no Python/CoolProp needed
      - run: node tests/e2e.mjs
      - run: node tests/units.mjs
